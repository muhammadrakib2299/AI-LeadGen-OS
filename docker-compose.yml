services:
  postgres:
    # pgvector-bundled image. Keeps pgcrypto + uuid-ossp + pg_trgm we
    # already use, adds the vector type for AI Ask Mode v2.
    image: pgvector/pgvector:pg16
    container_name: leadgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: leadgen
      POSTGRES_DB: leadgen
    ports:
      - "55432:5432"  # host 55432 -> container 5432, avoids clashes with native postgres and other projects
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen -d leadgen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"  # host 6380 -> container 6379, avoids other local Redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
